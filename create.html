<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a Deal - Freebie</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .char-counter {
      font-size: 12px;
      color: #999;
      text-align: right;
      margin-top: 4px;
    }
    .char-counter.warn { color: #c0392b; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">Freebie</a>
    <div class="nav-right">
      <span id="navUserName"></span>
      <button id="navLogoutBtn" class="btn btn-outline btn-sm">Logout</button>
    </div>
  </nav>

  <div class="container">
    <a href="freelancer-dashboard.html" class="back-link">&larr; Back to Dashboard</a>
    <h1>Create a Deal</h1>
    <p class="tagline">Fill in the deal details and send them to your client.</p>

    <form id="dealForm" class="deal-form">
      <div class="form-group">
        <label for="clientName">Client Name</label>
        <input type="text" id="clientName" placeholder="e.g. Priya Mehta" required />
      </div>

      <div class="form-group">
        <label for="clientEmail">Client Email</label>
        <input type="email" id="clientEmail" placeholder="client@example.com" required />
      </div>

      <div class="form-group">
        <label for="workDescription">Work Description</label>
        <textarea id="workDescription" rows="5"
          placeholder="Describe the work clearly for both sides."
          maxlength="1000" required></textarea>
        <p class="char-counter" id="charCounter">0 / 1000</p>
      </div>

      <div class="form-group">
        <label for="paymentAmount">Payment Amount (₹)</label>
        <input type="number" id="paymentAmount" placeholder="e.g. 5000" min="1" step="1" required />
      </div>

      <div class="form-group">
        <label for="deadline">Deadline</label>
        <input type="date" id="deadline" required />
      </div>

      <p id="formError" class="hidden" style="color:#c0392b; margin-bottom:16px;"></p>
      <button type="submit" class="btn" id="submitBtn">Create Deal</button>
    </form>

    <div id="successBox" class="success-box hidden">
      <p><strong>🎉 Deal created!</strong></p>
      <p style="margin-top:8px;">Share this link with your client:</p>
      <p style="margin-top:8px; word-break:break-all;">
        <a id="dealLink" href="#" target="_blank" rel="noopener noreferrer"></a>
      </p>
      <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;">
        <button type="button" class="btn btn-outline" id="copyLinkBtn">Copy Link</button>
        <button type="button" class="btn btn-whatsapp" id="shareWhatsAppBtn">Share on WhatsApp</button>
        <a href="freelancer-dashboard.html" class="btn">Go to Dashboard</a>
      </div>
      <p id="copySuccessMsg" class="hidden" style="margin-top:12px; color:green;">Link copied!</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA3PZU3-2kuJpnydsKU6VOUP6G-KZH27-E",
      authDomain: "freebie-5762a.firebaseapp.com",
      projectId: "freebie-5762a",
      storageBucket: "freebie-5762a.firebasestorage.app",
      messagingSenderId: "621180509813",
      appId: "1:621180509813:web:51c7403390e80c91e1a23c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let freelancerProfile = null;
    let createdDealUrl = '';

    const form = document.getElementById('dealForm');
    const submitBtn = document.getElementById('submitBtn');
    const formError = document.getElementById('formError');
    const successBox = document.getElementById('successBox');
    const dealLink = document.getElementById('dealLink');
    const copySuccessMsg = document.getElementById('copySuccessMsg');
    const charCounter = document.getElementById('charCounter');
    const workDesc = document.getElementById('workDescription');

    // Character counter
    workDesc.addEventListener('input', () => {
      const len = workDesc.value.length;
      charCounter.textContent = `${len} / 1000`;
      charCounter.classList.toggle('warn', len > 900);
    });

    // Set min date to today
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('deadline').setAttribute('min', todayStr);

    function showError(msg) {
      formError.textContent = msg;
      formError.classList.remove('hidden');
    }

    function clearError() {
      formError.textContent = '';
      formError.classList.add('hidden');
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }

      document.getElementById('navUserName').textContent = user.displayName || user.email;

      const userSnap = await getDoc(doc(db, 'users', user.uid));
      if (!userSnap.exists()) { showError('Profile not found.'); submitBtn.disabled = true; return; }

      const userData = userSnap.data();
      if (userData.role !== 'freelancer') { window.location.href = 'client-dashboard.html'; return; }

      currentUser = user;
      freelancerProfile = userData;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      if (!currentUser || !freelancerProfile) { showError('Still loading. Try again.'); return; }

      const clientName = document.getElementById('clientName').value.trim();
      const clientEmail = document.getElementById('clientEmail').value.trim().toLowerCase();
      const workDescription = workDesc.value.trim();
      const paymentAmount = Number(document.getElementById('paymentAmount').value);
      const deadline = document.getElementById('deadline').value;

      // Validations
      if (!clientName) { showError('Enter client name.'); return; }
      if (!clientEmail) { showError('Enter client email.'); return; }
      if (clientEmail === currentUser.email) { showError("Client email can't be your own email."); return; }
      if (!workDescription) { showError('Enter work description.'); return; }
      if (paymentAmount <= 0) { showError('Enter a valid payment amount.'); return; }
      if (!deadline) { showError('Select a deadline.'); return; }

      // Confirm before submit
      const confirmed = confirm(
        `Creating deal with:\n\nClient: ${clientName}\nWork: ${workDescription.substring(0, 80)}...\nAmount: ₹${paymentAmount.toLocaleString('en-IN')}\nDeadline: ${deadline}\n\nProceed?`
      );
      if (!confirmed) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating...';

      const dealData = {
        clientName,
        clientEmail,
        workDescription,
        paymentAmount,
        deadline,
        status: 'pending',
        paymentStatus: 'unpaid',
        clientAgreed: false,
        freelancerAgreed: false,
        createdAt: new Date().toISOString(),
        freelancerEmail: currentUser.email,
        freelancerName: currentUser.displayName || freelancerProfile.name || currentUser.email
      };

      try {
        const docRef = await addDoc(collection(db, 'deals'), dealData);
        createdDealUrl = `${window.location.origin}/deal.html?id=${docRef.id}`;
        dealLink.href = createdDealUrl;
        dealLink.textContent = createdDealUrl;
        form.classList.add('hidden');
        successBox.classList.remove('hidden');
      } catch (err) {
        console.error(err);
        showError('Something went wrong. Try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Deal';
      }
    });

    document.getElementById('copyLinkBtn').addEventListener('click', async () => {
      if (!createdDealUrl) return;
      await navigator.clipboard.writeText(createdDealUrl);
      copySuccessMsg.classList.remove('hidden');
      setTimeout(() => copySuccessMsg.classList.add('hidden'), 2000);
    });

    document.getElementById('shareWhatsAppBtn').addEventListener('click', () => {
      if (!createdDealUrl) return;
      const msg = `Hi! Please review and agree to our deal: ${createdDealUrl}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    });

    document.getElementById('navLogoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
