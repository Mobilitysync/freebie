<!DOCTYPE html>
<html>
<head>
    <title>Deal Tracker</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

</head>
<body>

    <h1>Create Deal</h1>

    <form onsubmit="saveDeal(event)">
        <label>Client Name:</label><br>
        <input type="text" id="client"><br><br>

        <label>Freelancer Name:</label><br>
        <input type="text" id="freelancer"><br><br>

        <label>Work Description:</label><br>
        <input type="text" id="work"><br><br>

        <label>Amount:</label><br>
        <input type="number" id="amount"><br><br>

        <label>
            <input type="checkbox"> I agree to terms
        </label><br><br>

        <button type="submit">Save Deal</button>
    </form><h2>Saved Deal:</h2>
<p id="output"></p>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA3PZU3-2kuJpnydsKU6VOUP6G-KZH27-E",
  authDomain: "freebie-5762a.firebaseapp.com",
  projectId: "freebie-5762a",
  storageBucket: "freebie-5762a.firebasestorage.app",
  messagingSenderId: "621180509813",
  appId: "1:621180509813:web:51c7403390e80c91e1a23c",
  measurementId: "G-PQX9HHGD0J"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function saveDeal(event) {
    event.preventDefault();

    let client = document.getElementById("client").value;
    let freelancer = document.getElementById("freelancer").value;
    let work = document.getElementById("work").value;
    let amount = document.getElementById("amount").value;

    db.collection("deals").add({
        client: client,
        freelancer: freelancer,
        work: work,
        amount: amount
    })
    .then(() => {
        displayDeals();
    });
}

function displayDeals() {
    let output = "";

    db.collection("deals").get().then((snapshot) => {
        snapshot.forEach((doc) => {
            let deal = doc.data();

            output += "<p><b>Deal</b><br>" +
                      "Client: " + deal.client + "<br>" +
                      "Freelancer: " + deal.freelancer + "<br>" +
                      "Work: " + deal.work + "<br>" +
                      "Amount: " + deal.amount + "</p><hr>";
        });

        document.getElementById("output").innerHTML = output;
    });
}

window.onload = displayDeals;
</script></body>
</html>
