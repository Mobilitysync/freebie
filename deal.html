<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deal - Freebie</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">Freebie</a>
    <div class="nav-right">
      <span id="navUserName"></span>
    </div>
  </nav>

  <div class="container">
    <div id="loadingState">
      <p>Loading deal...</p>
    </div>

    <div id="dealContent" class="hidden">
      <h1>Deal Details</h1>
      <p class="tagline" id="dealStatusTagline"></p>

      <div class="deal-card">
        <div class="deal-row">
          <span class="deal-label">Freelancer</span>
          <span class="deal-value" id="dFreelancerName"></span>
        </div>
        <div class="deal-row">
          <span class="deal-label">Client</span>
          <span class="deal-value" id="dClientName"></span>
        </div>
        <div class="deal-row">
          <span class="deal-label">Work Description</span>
          <span class="deal-value" id="dWorkDescription"></span>
        </div>
        <div class="deal-row">
          <span class="deal-label">Payment Amount</span>
          <span class="deal-value" id="dPaymentAmount"></span>
        </div>
        <div class="deal-row">
          <span class="deal-label">Deadline</span>
          <span class="deal-value" id="dDeadline"></span>
        </div>
        <div class="deal-row">
          <span class="deal-label">Payment Status</span>
          <span class="deal-value" id="dPaymentStatus"></span>
        </div>
        <div class="deal-row">
          <span class="deal-label">Status</span>
          <span class="deal-value" id="dStatus"></span>
        </div>
        <div class="deal-row">
          <span class="deal-label">Freelancer Agreed</span>
          <span class="deal-value" id="dFreelancerAgreed"></span>
        </div>
        <div class="deal-row">
          <span class="deal-label">Client Agreed</span>
          <span class="deal-value" id="dClientAgreed"></span>
        </div>
      </div>

      <!-- Agreement section -->
      <div id="agreementSection" class="hidden" style="margin-top:24px;">
        <p id="agreementMsg" style="margin-bottom:16px; color:#555;"></p>
        <button class="btn" id="agreeBtn">I Agree to This Deal</button>
      </div>

      <!-- Fully agreed box -->
      <div id="fullyAgreedBox" class="success-box hidden" style="margin-top:24px;">
        <p><strong>✅ Both parties have agreed!</strong></p>
        <p style="margin-top:8px; color:#555;">This deal is now active.</p>
        <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; align-items:center;">
          <button type="button" class="btn" id="downloadPdfBtn">📄 Download PDF Receipt</button>
        </div>
      </div>

      <p id="dealError" class="hidden" style="color:#c0392b; margin-top:16px;"></p>
    </div>

    <div id="notFound" class="hidden">
      <p>Deal not found.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA3PZU3-2kuJpnydsKU6VOUP6G-KZH27-E",
      authDomain: "freebie-5762a.firebaseapp.com",
      projectId: "freebie-5762a",
      storageBucket: "freebie-5762a.firebasestorage.app",
      messagingSenderId: "621180509813",
      appId: "1:621180509813:web:51c7403390e80c91e1a23c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    emailjs.init("srtxybM1XCY_0Q07u");

    const params = new URLSearchParams(window.location.search);
    const dealId = params.get('id');

    let currentUser = null;
    let dealData = null;

    function formatCurrency(amount) {
      return '₹' + Number(amount).toLocaleString('en-IN');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const [y, m, d] = dateStr.split('-');
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${d} ${months[parseInt(m,10)-1]} ${y}`;
    }

    function showDealError(msg) {
      const el = document.getElementById('dealError');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    // ─── PDF Generation ────────────────────────────────────────
    function downloadPDF(deal, id) {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
      const pageW = pdf.internal.pageSize.getWidth();
      const margin = 20;
      const contentW = pageW - margin * 2;

      // Header
      pdf.setFillColor(1, 105, 111);
      pdf.rect(0, 0, pageW, 38, 'F');
      pdf.setTextColor(255, 255, 255);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(22);
      pdf.text('Freebie', margin, 18);
      pdf.setFontSize(10);
      pdf.setFont('helvetica', 'normal');
      pdf.text('Deal Receipt', margin, 26);
      pdf.setFontSize(8);
      pdf.setTextColor(200, 230, 232);
      pdf.text(`Deal ID: ${id}`, margin, 33);
      const genDate = new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
      pdf.text(`Generated: ${genDate}`, pageW - margin, 33, { align: 'right' });

      let y = 52;

      // Status badge
      const statusColor = (deal.status === 'active' || deal.status === 'completed') ? [39, 174, 96] : [231, 76, 60];
      pdf.setFillColor(...statusColor);
      pdf.roundedRect(margin, y - 5, 36, 8, 2, 2, 'F');
      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(8);
      pdf.setFont('helvetica', 'bold');
      pdf.text(deal.status.toUpperCase(), margin + 18, y, { align: 'center' });
      y += 12;

      // Deal Summary
      pdf.setTextColor(40, 37, 29);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(13);
      pdf.text('Deal Details', margin, y);
      y += 2;
      pdf.setDrawColor(212, 209, 202);
      pdf.setLineWidth(0.4);
      pdf.line(margin, y, pageW - margin, y);
      y += 8;

      function row(label, value, highlight = false) {
        if (highlight) {
          pdf.setFillColor(206, 220, 216);
          pdf.roundedRect(margin, y - 4, contentW, 10, 1.5, 1.5, 'F');
        }
        pdf.setTextColor(122, 121, 116);
        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(8.5);
        pdf.text(label, margin + 3, y + 1);
        pdf.setTextColor(40, 37, 29);
        pdf.setFont('helvetica', highlight ? 'bold' : 'normal');
        pdf.setFontSize(highlight ? 10 : 9);
        pdf.text(String(value), margin + 50, y + 1);
        y += 13;
      }

      row('Freelancer', deal.freelancerName || deal.freelancerEmail);
      row('Freelancer Email', deal.freelancerEmail);
      row('Client', deal.clientName);
      row('Client Email', deal.clientEmail);
      row('Created Date', formatDate(deal.createdAt ? deal.createdAt.split('T')[0] : ''));
      y += 2;

      // Work description
      pdf.setTextColor(122, 121, 116);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(8.5);
      pdf.text('Work Description', margin + 3, y);
      y += 6;
      pdf.setTextColor(40, 37, 29);
      pdf.setFontSize(9);
      const descLines = pdf.splitTextToSize(deal.workDescription, contentW - 6);
      pdf.text(descLines, margin + 3, y);
      y += descLines.length * 5 + 6;

      pdf.setDrawColor(212, 209, 202);
      pdf.line(margin, y, pageW - margin, y);
      y += 8;

      row('Deadline', formatDate(deal.deadline));
      row('Payment Amount', formatCurrency(deal.paymentAmount), true);
      row('Payment Status', (deal.paymentStatus || 'unpaid').toUpperCase());
      row('Deal Status', deal.status.toUpperCase());

      y += 4;
      pdf.setDrawColor(212, 209, 202);
      pdf.line(margin, y, pageW - margin, y);
      y += 8;

      // Agreement Status
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(10);
      pdf.setTextColor(40, 37, 29);
      pdf.text('Agreement Status', margin, y);
      y += 8;

      function agreeBadge(label, agreed, x) {
        pdf.setFillColor(...(agreed ? [39, 174, 96] : [189, 195, 199]));
        pdf.roundedRect(x, y - 5, 70, 10, 2, 2, 'F');
        pdf.setTextColor(255, 255, 255);
        pdf.setFontSize(8);
        pdf.setFont('helvetica', 'bold');
        pdf.text(`${label}: ${agreed ? '✓ Agreed' : 'Pending'}`, x + 35, y, { align: 'center' });
      }

      agreeBadge('Freelancer', deal.freelancerAgreed, margin);
      agreeBadge('Client', deal.clientAgreed, margin + 76);
      y += 14;

      // Footer
      const footerY = pdf.internal.pageSize.getHeight() - 18;
      pdf.setDrawColor(212, 209, 202);
      pdf.line(margin, footerY - 4, pageW - margin, footerY - 4);
      pdf.setTextColor(122, 121, 116);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(7.5);
      pdf.text('This is a system-generated receipt from Freebie. Please retain it for your records.', pageW / 2, footerY, { align: 'center' });
      pdf.text(`Generated by Freebie - freebie-5762a.web.app - ${genDate}`, pageW / 2, footerY + 5, { align: 'center' });

      pdf.save(`freebie-deal-${id.substring(0, 8)}.pdf`);
    }

    // ─── Auth & Load ──────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;

      if (user) {
        const nameEl = document.getElementById('navUserName');
        if (nameEl) nameEl.textContent = user.displayName || user.email;
      }

      if (!dealId) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('notFound').classList.remove('hidden');
        return;
      }

      const dealSnap = await getDoc(doc(db, 'deals', dealId));
      document.getElementById('loadingState').classList.add('hidden');

      if (!dealSnap.exists()) {
        document.getElementById('notFound').classList.remove('hidden');
        return;
      }

      dealData = dealSnap.data();
      renderDeal(dealData);
    });

    function renderDeal(d) {
      document.getElementById('dealContent').classList.remove('hidden');

      const tagline = document.getElementById('dealStatusTagline');
      if (d.status === 'active' || d.status === 'completed') {
        tagline.textContent = '✅ This deal is active — both parties have agreed.';
        tagline.style.color = '#27ae60';
      } else {
        tagline.textContent = '⏳ Waiting for both parties to agree.';
        tagline.style.color = '#e67e22';
      }

      document.getElementById('dFreelancerName').textContent = d.freelancerName || d.freelancerEmail;
      document.getElementById('dClientName').textContent = d.clientName;
      document.getElementById('dWorkDescription').textContent = d.workDescription;
      document.getElementById('dPaymentAmount').textContent = formatCurrency(d.paymentAmount);
      document.getElementById('dDeadline').textContent = formatDate(d.deadline);
      document.getElementById('dPaymentStatus').textContent = (d.paymentStatus || 'unpaid').charAt(0).toUpperCase() + (d.paymentStatus || 'unpaid').slice(1);
      document.getElementById('dStatus').textContent = d.status.charAt(0).toUpperCase() + d.status.slice(1);
      document.getElementById('dFreelancerAgreed').textContent = d.freelancerAgreed ? '✅ Yes' : '⏳ Pending';
      document.getElementById('dClientAgreed').textContent = d.clientAgreed ? '✅ Yes' : '⏳ Pending';

      // Both agreed — show PDF button
      if (d.freelancerAgreed && d.clientAgreed) {
        document.getElementById('fullyAgreedBox').classList.remove('hidden');
        document.getElementById('downloadPdfBtn').addEventListener('click', () => downloadPDF(d, dealId));
        return;
      }

      if (!currentUser) {
        document.getElementById('agreementSection').classList.remove('hidden');
        document.getElementById('agreementMsg').textContent = 'Log in to agree to this deal.';
        document.getElementById('agreeBtn').disabled = true;
        return;
      }

      const userEmail = currentUser.email.toLowerCase();
      const isFreelancer = userEmail === d.freelancerEmail.toLowerCase();
      const isClient = userEmail === d.clientEmail.toLowerCase();

      if (!isFreelancer && !isClient) return;

      const alreadyAgreed = (isFreelancer && d.freelancerAgreed) || (isClient && d.clientAgreed);

      if (alreadyAgreed) {
        document.getElementById('agreementSection').classList.remove('hidden');
        document.getElementById('agreementMsg').textContent = "✅ You've already agreed. Waiting for the other party.";
        document.getElementById('agreeBtn').classList.add('hidden');
        return;
      }

      document.getElementById('agreementSection').classList.remove('hidden');
      document.getElementById('agreementMsg').textContent = isFreelancer
        ? 'As the freelancer, you can agree to this deal below.'
        : 'As the client, please review and agree to this deal.';

      document.getElementById('agreeBtn').addEventListener('click', async () => {
        const confirmed = confirm('By clicking OK, you confirm you agree to all terms of this deal.');
        if (!confirmed) return;

        const agreeBtn = document.getElementById('agreeBtn');
        agreeBtn.disabled = true;
        agreeBtn.textContent = 'Saving...';

        try {
          const updateField = isFreelancer ? { freelancerAgreed: true } : { clientAgreed: true };
          const otherAgreed = isFreelancer ? dealData.clientAgreed : dealData.freelancerAgreed;
          if (otherAgreed) updateField.status = 'active';

          await updateDoc(doc(db, 'deals', dealId), updateField);

          // Email freelancer when client agrees
          if (isClient) {
            try {
              await emailjs.send("service_li63q25", "template_5csdxp7", {
                email: dealData.freelancerEmail,
                freelancer_name: dealData.freelancerName,
                client_name: dealData.clientName,
                work_description: dealData.workDescription,
                amount: Number(dealData.paymentAmount).toLocaleString('en-IN'),
                deadline: formatDate(dealData.deadline),
                deal_link: `${window.location.origin}/deal.html?id=${dealId}`
              });
            } catch (emailErr) {
              console.warn('Freelancer email failed (non-blocking):', emailErr);
            }
          }

          const refreshed = await getDoc(doc(db, 'deals', dealId));
          dealData = refreshed.data();
          document.getElementById('dealContent').classList.add('hidden');
          renderDeal(dealData);
        } catch (err) {
          console.error(err);
          showDealError('Something went wrong. Try again.');
          agreeBtn.disabled = false;
          agreeBtn.textContent = 'I Agree to This Deal';
        }
      });
    }
  </script>
</body>
</html>
