<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freelancer Login – Freebie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">Freebie</a>
    <div class="nav-right">
      <span id="navUserName"></span>
    </div>
  </nav>

  <div class="container">

    <a href="index.html" class="back-link">← Back</a>

    <h1>Freelancer Login</h1>
    <p class="tagline">Access your deals and manage your work.</p>

    <div class="auth-box">

      <button id="googleBtn" class="btn btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google" />
        Continue with Google
      </button>

      <div class="divider" id="divider"><span>or</span></div>

      <form id="emailForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" required />
        </div>
        <div class="auth-actions" id="authActions">
          <button type="button" id="loginBtn" class="btn">Login</button>
          <button type="button" id="signupBtn" class="btn btn-outline">Sign Up</button>
        </div>

        <div id="signupStep" class="hidden">
          <div class="form-group" style="margin-top:16px;">
            <label for="nameInput">Full Name</label>
            <input type="text" id="nameInput" placeholder="Your full name" />
          </div>
          <div class="auth-actions">
            <button type="button" id="createAccountBtn" class="btn">Create Account</button>
            <button type="button" id="cancelSignupBtn" class="btn btn-outline">Cancel</button>
          </div>
        </div>
      </form>

      <p id="authError" class="error-msg hidden"></p>

    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA3PZU3-2kuJpnydsKU6VOUP6G-KZH27-E",
      authDomain: "freebie-5762a.firebaseapp.com",
      projectId: "freebie-5762a",
      storageBucket: "freebie-5762a.firebasestorage.app",
      messagingSenderId: "621180509813",
      appId: "1:621180509813:web:51c7403390e80c91e1a23c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const errorEl = document.getElementById('authError');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }

    function clearError() {
      errorEl.textContent = '';
      errorEl.classList.add('hidden');
    }

    function getRedirect() {
      const r = sessionStorage.getItem('redirectAfterLogin');
      sessionStorage.removeItem('redirectAfterLogin');
      return r || 'freelancer-dashboard.html';
    }

    async function handleSuccess(user) {
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (snap.exists() && snap.data().role !== 'freelancer') {
        showError('This account is registered as a client. Please use client login.');
        await auth.signOut();
        return;
      }
      if (!snap.exists()) {
        await setDoc(ref, {
          name: user.displayName || user.email,
          email: user.email,
          role: 'freelancer',
          createdAt: new Date().toISOString()
        }, { merge: true });
      }
      window.location.href = getRedirect();
    }

    // Google
    document.getElementById('googleBtn').addEventListener('click', async () => {
      clearError();
      try {
        const result = await signInWithPopup(auth, provider);
        await handleSuccess(result.user);
      } catch (err) {
        showError(err.message);
      }
    });

    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
      clearError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Enter email and password.'); return; }
      try {
        const result = await signInWithEmailAndPassword(auth, email, password);
        await handleSuccess(result.user);
      } catch (err) {
        showError('Login failed: ' + err.message);
      }
    });

    // Show signup step
    document.getElementById('signupBtn').addEventListener('click', () => {
      clearError();
      document.getElementById('authActions').classList.add('hidden');
      document.getElementById('googleBtn').classList.add('hidden');
      document.getElementById('divider').classList.add('hidden');
      document.getElementById('signupStep').classList.remove('hidden');
    });

    // Cancel signup
    document.getElementById('cancelSignupBtn').addEventListener('click', () => {
      clearError();
      document.getElementById('authActions').classList.remove('hidden');
      document.getElementById('googleBtn').classList.remove('hidden');
      document.getElementById('divider').classList.remove('hidden');
      document.getElementById('signupStep').classList.add('hidden');
    });

    // Create account
    document.getElementById('createAccountBtn').addEventListener('click', async () => {
      clearError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const name = document.getElementById('nameInput').value.trim();
      if (!email || !password) { showError('Enter email and password.'); return; }
      if (!name) { showError('Enter your full name.'); return; }
      try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'users', result.user.uid), {
          name,
          email: result.user.email,
          role: 'freelancer',
          createdAt: new Date().toISOString()
        }, { merge: true });
        window.location.href = getRedirect();
      } catch (err) {
        showError('Signup failed: ' + err.message);
      }
    });
  </script>

</body>
</html>
