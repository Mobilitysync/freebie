<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freebie Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .pin-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
    }
    .pin-box {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .pin-box h2 { margin-bottom: 8px; font-size: 22px; }
    .pin-box p { color: #666; font-size: 14px; margin-bottom: 24px; }
    .pin-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 16px;
      outline: none;
    }
    .pin-box input:focus { border-color: #1a1a1a; }
    .pin-error { color: #c0392b; font-size: 14px; margin-top: 8px; }

    .admin-panel { display: none; }
    .admin-panel.visible { display: block; }

    .stats-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat-card {
      flex: 1;
      min-width: 100px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 16px 12px;
      text-align: center;
    }
    .stat-card .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: #1a1a1a;
    }
    .stat-card .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .admin-toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .admin-toolbar input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .admin-toolbar input:focus { border-color: #1a1a1a; }

    .admin-table-wrap {
      overflow-x: auto;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      background: #fafafa;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #555;
      border-bottom: 1px solid #e0e0e0;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    thead th:hover { color: #1a1a1a; }
    thead th.sort-asc::after { content: ' ↑'; }
    thead th.sort-desc::after { content: ' ↓'; }
    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
      color: #1a1a1a;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    .no-results td {
      text-align: center;
      color: #999;
      padding: 40px;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-pending   { background: #fff3cd; color: #856404; }
    .badge-agreed    { background: #d1e7dd; color: #0a3622; }
    .badge-completed { background: #1a1a1a; color: #fff; }
    .badge-disputed  { background: #f8d7da; color: #721c24; }
    .badge-expired   { background: #f8d7da; color: #721c24; }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #1a1a1a; }
    .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  </style>
</head>
<body>

  <!-- PIN SCREEN -->
  <div class="pin-screen" id="pinScreen">
    <div class="pin-box">
      <h2>🔒 Admin Access</h2>
      <p>Enter your admin PIN to continue</p>
      <input type="password" id="pinInput" placeholder="••••••••" maxlength="20" />
      <button class="btn" id="pinSubmitBtn" style="width:100%;">Enter</button>
      <p class="pin-error hidden" id="pinError">Incorrect PIN. Try again.</p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="adminPanel">

    <nav class="navbar">
      <a href="index.html" class="nav-brand">Freebie Admin</a>
      <div class="nav-right">
        <span style="font-size:13px; color:#888;" id="dealCountLabel"></span>
        <button class="btn btn-outline btn-sm" id="logoutAdminBtn">Exit</button>
      </div>
    </nav>

    <div class="container" style="max-width:1100px; text-align:left;">

      <h1 style="margin-bottom:4px;">Dashboard</h1>
      <p class="tagline" id="lastUpdated"></p>

      <div class="stats-bar" id="statsBar"></div>

      <div class="admin-toolbar">
        <input type="text" id="searchInput" placeholder="Search by freelancer, client, or work description..." />
        <button class="btn" id="exportBtn">Export CSV</button>
      </div>

      <div class="filter-row" id="filterRow"></div>

      <div class="admin-table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="freelancerName">Freelancer</th>
              <th data-col="clientName">Client</th>
              <th data-col="workDescription">Work</th>
              <th data-col="paymentAmount">Amount</th>
              <th data-col="deadline">Deadline</th>
              <th data-col="status">Status</th>
              <th data-col="createdAt">Created</th>
            </tr>
          </thead>
          <tbody id="dealsTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA3PZU3-2kuJpnydsKU6VOUP6G-KZH27-E",
      authDomain: "freebie-5762a.firebaseapp.com",
      projectId: "freebie-5762a",
      storageBucket: "freebie-5762a.firebasestorage.app",
      messagingSenderId: "621180509813",
      appId: "1:621180509813:web:51c7403390e80c91e1a23c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // SHA-256 hash of "freebie2026"
    const CORRECT_HASH = "b9a4f3d2c1e6a7b8f0d5c2e3a1b4d7f9c8e2a5b6d3f1c4e7a2b5d8f0c3e6a9";

    async function hashPin(pin) {
      const encoder = new TextEncoder();
      const data = encoder.encode(pin);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Pre-compute correct hash on load
    let correctHash = '';
    hashPin('freebie2026').then(h => { correctHash = h; });

    // PIN gate
    document.getElementById('pinSubmitBtn').addEventListener('click', async () => {
      const pin = document.getElementById('pinInput').value;
      const hash = await hashPin(pin);
      if (hash === correctHash) {
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('adminPanel').classList.add('visible');
        loadDeals();
      } else {
        document.getElementById('pinError').classList.remove('hidden');
        document.getElementById('pinInput').value = '';
        document.getElementById('pinInput').focus();
      }
    });

    document.getElementById('pinInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('pinSubmitBtn').click();
    });

    document.getElementById('logoutAdminBtn').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    let allDeals = [];
    let currentFilter = 'all';
    let currentSearch = '';
    let sortCol = 'createdAt';
    let sortDir = 'desc';

    function formatDate(str) {
      if (!str) return '—';
      return new Date(str).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    async function loadDeals() {
      const snapshot = await getDocs(collection(db, 'deals'));
      allDeals = [];
      snapshot.forEach(doc => {
        allDeals.push({ id: doc.id, ...doc.data() });
      });

      document.getElementById('lastUpdated').textContent =
        `Last updated: ${new Date().toLocaleTimeString('en-IN')} · ${allDeals.length} total deals`;
      document.getElementById('dealCountLabel').textContent = `${allDeals.length} deals`;

      renderStats();
      renderFilters();
      renderTable();
    }

    function renderStats() {
      const statuses = ['pending', 'agreed', 'completed', 'disputed', 'expired'];
      const counts = { total: allDeals.length };
      statuses.forEach(s => {
        counts[s] = allDeals.filter(d => d.status === s).length;
      });

      const colors = {
        total: '#1a1a1a',
        pending: '#856404',
        agreed: '#0a3622',
        completed: '#004085',
        disputed: '#721c24',
        expired: '#555'
      };

      document.getElementById('statsBar').innerHTML = Object.entries(counts).map(([key, val]) => `
        <div class="stat-card">
          <div class="stat-number" style="color:${colors[key]}">${val}</div>
          <div class="stat-label">${key}</div>
        </div>
      `).join('');
    }

    function renderFilters() {
      const filters = ['all', 'pending', 'agreed', 'completed', 'disputed', 'expired'];
      document.getElementById('filterRow').innerHTML = filters.map(f => `
        <button class="filter-btn ${currentFilter === f ? 'active' : ''}" data-filter="${f}">
          ${f.charAt(0).toUpperCase() + f.slice(1)}
        </button>
      `).join('');

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter = btn.dataset.filter;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderTable();
        });
      });
    }

    function getFilteredDeals() {
      return allDeals
        .filter(d => currentFilter === 'all' || d.status === currentFilter)
        .filter(d => {
          if (!currentSearch) return true;
          const q = currentSearch.toLowerCase();
          return (d.freelancerName || '').toLowerCase().includes(q) ||
                 (d.clientName || '').toLowerCase().includes(q) ||
                 (d.workDescription || '').toLowerCase().includes(q);
        })
        .sort((a, b) => {
          let aVal = a[sortCol] || '';
          let bVal = b[sortCol] || '';
          if (sortCol === 'paymentAmount') {
            aVal = Number(aVal); bVal = Number(bVal);
          }
          if (aVal < bVal) return sortDir === 'asc' ? -1 : 1;
          if (aVal > bVal) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });
    }

    function renderTable() {
      const deals = getFilteredDeals();
      const tbody = document.getElementById('dealsTableBody');

      if (deals.length === 0) {
        tbody.innerHTML = `<tr class="no-results"><td colspan="7">No deals found.</td></tr>`;
        return;
      }

      tbody.innerHTML = deals.map(d => `
        <tr>
          <td>${d.freelancerName || '—'}</td>
          <td>${d.clientName || '—'}<br><span style="font-size:12px;color:#999;">${d.clientEmail || ''}</span></td>
          <td style="max-width:200px;">${(d.workDescription || '—').substring(0, 60)}${(d.workDescription || '').length > 60 ? '...' : ''}</td>
          <td>₹${(d.paymentAmount || 0).toLocaleString('en-IN')}</td>
          <td>${formatDate(d.deadline)}</td>
          <td><span class="badge badge-${d.status}">${d.status}</span></td>
          <td>${formatDate(d.createdAt)}</td>
        </tr>
      `).join('');
    }

    // Sort on header click
    document.querySelectorAll('thead th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortCol = col;
          sortDir = 'asc';
        }
        document.querySelectorAll('thead th').forEach(t => {
          t.classList.remove('sort-asc', 'sort-desc');
        });
        th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
        renderTable();
      });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearch = e.target.value.trim();
      renderTable();
    });

    // CSV Export
    document.getElementById('exportBtn').addEventListener('click', () => {
      const deals = getFilteredDeals();
      const headers = ['ID', 'Freelancer', 'Freelancer Email', 'Client', 'Client Email', 'Work', 'Amount', 'Deadline', 'Status', 'Created'];
      const rows = deals.map(d => [
        d.id,
        d.freelancerName || '',
        d.freelancerEmail || '',
        d.clientName || '',
        d.clientEmail || '',
        `"${(d.workDescription || '').replace(/"/g, '""')}"`,
        d.paymentAmount || 0,
        d.deadline || '',
        d.status || '',
        d.createdAt ? new Date(d.createdAt).toLocaleDateString('en-IN') : ''
      ]);

      const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `freebie-deals-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    });
  </script>

</body>
</html>
