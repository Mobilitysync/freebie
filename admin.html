<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freebie Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .pin-screen {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: #f5f5f5;
    }
    .pin-box {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 12px;
      padding: 40px 32px; width: 100%; max-width: 360px; text-align: center;
    }
    .pin-box h2 { margin-bottom: 8px; font-size: 22px; }
    .pin-box p { color: #666; font-size: 14px; margin-bottom: 24px; }
    .pin-box input {
      width: 100%; padding: 12px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 16px; text-align: center;
      letter-spacing: 4px; margin-bottom: 16px; outline: none;
    }
    .pin-box input:focus { border-color: #1a1a1a; }
    .pin-error { color: #c0392b; font-size: 14px; margin-top: 8px; }
    .admin-panel { display: none; }
    .admin-panel.visible { display: block; }
    .stats-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .stat-card {
      flex: 1; min-width: 100px; background: #fff; border: 1px solid #e0e0e0;
      border-radius: 10px; padding: 16px 12px; text-align: center;
    }
    .stat-card .stat-number { font-size: 28px; font-weight: 800; color: #1a1a1a; }
    .stat-card .stat-label { font-size: 12px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .admin-toolbar {
      display: flex; gap: 12px; align-items: center;
      flex-wrap: wrap; margin-bottom: 16px;
    }
    .admin-toolbar input {
      flex: 1; min-width: 200px; padding: 10px 14px;
      border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none;
    }
    .admin-toolbar input:focus { border-color: #1a1a1a; }
    .admin-table-wrap {
      overflow-x: auto; background: #fff;
      border: 1px solid #e0e0e0; border-radius: 12px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      background: #fafafa; padding: 12px 16px; text-align: left;
      font-weight: 600; color: #555; border-bottom: 1px solid #e0e0e0;
      cursor: pointer; white-space: nowrap; user-select: none;
    }
    thead th:hover { color: #1a1a1a; }
    thead th.sort-asc::after  { content: ' ↑'; }
    thead th.sort-desc::after { content: ' ↓'; }
    tbody td {
      padding: 12px 16px; border-bottom: 1px solid #f0f0f0;
      vertical-align: top; color: #1a1a1a;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    .no-results td { text-align: center; color: #999; padding: 40px; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-pending   { background: #fff3cd; color: #856404; }
    .badge-active    { background: #d1e7dd; color: #0a3622; }
    .badge-agreed    { background: #d1e7dd; color: #0a3622; }
    .badge-completed { background: #1a1a1a; color: #fff; }
    .badge-disputed  { background: #f8d7da; color: #721c24; }
    .badge-expired   { background: #e2e3e5; color: #555; }
    .pay-badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
    }
    .pay-unpaid  { background: #fff3cd; color: #856404; }
    .pay-partial { background: #ffe0b2; color: #a05c00; }
    .pay-paid    { background: #d1e7dd; color: #0a3622; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-btn {
      padding: 6px 14px; border-radius: 999px; border: 1px solid #ddd;
      background: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #1a1a1a; }
    .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    /* Dispute modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 16px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #fff; border-radius: 14px; padding: 28px 24px;
      width: 100%; max-width: 480px; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .modal-box h2 { font-size: 18px; margin-bottom: 6px; }
    .modal-box .modal-meta { font-size: 13px; color: #777; margin-bottom: 18px; }
    .modal-box label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
    .modal-box textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 14px; resize: vertical;
      min-height: 80px; outline: none; box-sizing: border-box;
    }
    .modal-box textarea:focus { border-color: #1a1a1a; }
    .modal-actions {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-top: 18px; justify-content: flex-end;
    }
    .btn-resolve   { background: #0a3622; color: #fff; border: none; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-reopen    { background: #856404; color: #fff; border: none; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-cancel-m  { background: #f0f0f0; color: #333; border: none; padding: 9px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .resolution-note {
      font-size: 12px; color: #555; font-style: italic;
      margin-top: 4px; max-width: 220px;
    }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1a1a; color: #fff; padding: 10px 20px;
      border-radius: 8px; font-size: 14px; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; z-index: 1100;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-box">
    <h2>Admin Access</h2>
    <p>Enter your admin PIN to continue</p>
    <input type="password" id="pinInput" maxlength="20" />
    <button class="btn" id="pinSubmitBtn" style="width:100%">Enter</button>
    <p class="pin-error hidden" id="pinError">Incorrect PIN. Try again.</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
  <nav class="navbar">
    <a href="index.html" class="nav-brand">Freebie Admin</a>
    <div class="nav-right">
      <span style="font-size:13px;color:#888" id="dealCountLabel"></span>
      <button class="btn btn-outline btn-sm" id="logoutAdminBtn">Exit</button>
    </div>
  </nav>

  <div class="container" style="max-width:1100px; text-align:left">
    <h1 style="margin-bottom:4px">Dashboard</h1>
    <p class="tagline" id="lastUpdated"></p>

    <div class="stats-bar" id="statsBar"></div>

    <div class="admin-toolbar">
      <input type="text" id="searchInput" placeholder="Search by freelancer, client, or description..." />
      <button class="btn" id="exportBtn">Export CSV</button>
    </div>

    <div class="filter-row" id="filterRow"></div>

    <div class="admin-table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="freelancerName">Freelancer</th>
            <th data-col="clientName">Client</th>
            <th data-col="workDescription">Work</th>
            <th data-col="paymentAmount">Amount</th>
            <th data-col="deadline">Deadline</th>
            <th data-col="status">Status</th>
            <th data-col="paymentStatus">Payment</th>
            <th data-col="createdAt">Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="dealsTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- DISPUTE MODAL -->
<div class="modal-overlay hidden" id="disputeModal">
  <div class="modal-box">
    <h2 id="modalTitle">Resolve Dispute</h2>
    <p class="modal-meta" id="modalMeta"></p>
    <label for="resolutionNote">Resolution Note (shown on record)</label>
    <textarea id="resolutionNote" placeholder="Describe the resolution or reason for action..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel-m" id="modalCancelBtn">Cancel</button>
      <button class="btn-reopen" id="modalReopenBtn">↩ Re-open as Active</button>
      <button class="btn-resolve" id="modalResolveBtn">✔ Mark Resolved</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA3PZU3-2kuJpnydsKU6VOUP6G-KZH27-E",
    authDomain: "freebie-5762a.firebaseapp.com",
    projectId: "freebie-5762a",
    storageBucket: "freebie-5762a.firebasestorage.app",
    messagingSenderId: "621180509813",
    appId: "1:621180509813:web:51c7403390e80c91e1a23c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // SHA-256 of "freebie2026"
  const CORRECT_HASH = 'b9a4f3d2c1e6a7b8f0d5c2e3a1b4d7f9c8e2a5b6d3f1c4e7a2b5d8f0c3e6a9';

  async function hashPin(pin) {
    const encoder = new TextEncoder();
    const data = encoder.encode(pin);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  let correctHash;
  hashPin('freebie2026').then(h => { correctHash = h; });

  // PIN gate
  document.getElementById('pinSubmitBtn').addEventListener('click', async () => {
    const pin = document.getElementById('pinInput').value;
    const hash = await hashPin(pin);
    if (hash === correctHash) {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('adminPanel').classList.add('visible');
      loadDeals();
    } else {
      document.getElementById('pinError').classList.remove('hidden');
      document.getElementById('pinInput').value = '';
      document.getElementById('pinInput').focus();
    }
  });
  document.getElementById('pinInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('pinSubmitBtn').click();
  });
  document.getElementById('logoutAdminBtn').addEventListener('click', () => { window.location.href = 'index.html'; });

  // ─── State ─────────────────────────────────────────────────
  let allDeals = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let sortCol = 'createdAt';
  let sortDir = 'desc';
  let activeModalDealId = null;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function formatDate(str) {
    if (!str) return '—';
    return new Date(str).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // ─── Load ──────────────────────────────────────────────────
  async function loadDeals() {
    const snapshot = await getDocs(collection(db, 'deals'));
    allDeals = [];
    snapshot.forEach(doc => allDeals.push({ id: doc.id, ...doc.data() }));
    document.getElementById('lastUpdated').textContent =
      `Last updated ${new Date().toLocaleTimeString('en-IN')} · ${allDeals.length} total deals`;
    document.getElementById('dealCountLabel').textContent = `${allDeals.length} deals`;
    renderStats();
    renderFilters();
    renderTable();
  }

  // ─── Stats ─────────────────────────────────────────────────
  function renderStats() {
    const statuses = ['pending','active','completed','disputed','expired'];
    const counts = { total: allDeals.length };
    statuses.forEach(s => counts[s] = allDeals.filter(d => d.status === s).length);
    const colors = { total:'#1a1a1a', pending:'#856404', active:'#0a3622', completed:'#004085', disputed:'#721c24', expired:'#555' };
    document.getElementById('statsBar').innerHTML = Object.entries(counts)
      .map(([key, val]) => `
        <div class="stat-card">
          <div class="stat-number" style="color:${colors[key]}">${val}</div>
          <div class="stat-label">${key}</div>
        </div>`).join('');
  }

  // ─── Filters ───────────────────────────────────────────────
  function renderFilters() {
    const filters = ['all','pending','active','completed','disputed','expired'];
    document.getElementById('filterRow').innerHTML = filters
      .map(f => `<button class="filter-btn ${currentFilter === f ? 'active' : ''}" data-filter="${f}">${f.charAt(0).toUpperCase() + f.slice(1)}</button>`)
      .join('');
    document.querySelectorAll('.filter-btn').forEach(btn =>
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTable();
      })
    );
  }

  // ─── Table ─────────────────────────────────────────────────
  function getFilteredDeals() {
    return allDeals
      .filter(d => currentFilter === 'all' || d.status === currentFilter)
      .filter(d => {
        if (!currentSearch) return true;
        const q = currentSearch.toLowerCase();
        return (d.freelancerName||'').toLowerCase().includes(q) ||
               (d.clientName||'').toLowerCase().includes(q) ||
               (d.workDescription||'').toLowerCase().includes(q);
      })
      .sort((a, b) => {
        let aVal = a[sortCol], bVal = b[sortCol];
        if (sortCol === 'paymentAmount') { aVal = Number(aVal); bVal = Number(bVal); }
        if (aVal < bVal) return sortDir === 'asc' ? -1 : 1;
        if (aVal > bVal) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });
  }

  function renderTable() {
    const deals = getFilteredDeals();
    const tbody = document.getElementById('dealsTableBody');

    if (deals.length === 0) {
      tbody.innerHTML = `<tr class="no-results"><td colspan="9">No deals found.</td></tr>`;
      return;
    }

    const payBadge = ps => {
      const map = { unpaid:'pay-unpaid', partial:'pay-partial', paid:'pay-paid' };
      const label = { unpaid:'Unpaid', partial:'Partial', paid:'Paid' };
      const cls = map[ps] || 'pay-unpaid';
      return `<span class="pay-badge ${cls}">${label[ps] || 'Unpaid'}</span>`;
    };

    tbody.innerHTML = deals.map(d => {
      const isDisputed = d.status === 'disputed';
      const resolvedNote = d.resolutionNote
        ? `<div class="resolution-note">📝 ${d.resolutionNote.substring(0, 60)}${d.resolutionNote.length > 60 ? '…' : ''}</div>`
        : '';

      return `<tr>
        <td>${d.freelancerName || '—'}<br><span style="font-size:12px;color:#999">${d.freelancerEmail || ''}</span></td>
        <td>${d.clientName || '—'}<br><span style="font-size:12px;color:#999">${d.clientEmail || ''}</span></td>
        <td style="max-width:200px">${(d.workDescription||'').substring(0,60)}${(d.workDescription||'').length > 60 ? '…' : ''}</td>
        <td>₹${(d.paymentAmount||0).toLocaleString('en-IN')}</td>
        <td>${formatDate(d.deadline)}</td>
        <td>
          <span class="badge badge-${d.status}">${d.status}</span>
          ${resolvedNote}
        </td>
        <td>${payBadge(d.paymentStatus || 'unpaid')}</td>
        <td>${formatDate(d.createdAt)}</td>
        <td>
          <a href="deal.html?id=${d.id}" target="_blank" style="font-size:13px;color:#01696f;text-decoration:none;">View</a>
          ${isDisputed ? `<br><button class="btn btn-sm" style="margin-top:6px;font-size:12px" data-resolve="${d.id}">Resolve</button>` : ''}
          ${!isDisputed && d.status !== 'expired' ? `<br><button class="btn btn-sm" style="margin-top:6px;font-size:12px;background:#f8d7da;color:#721c24;border:none" data-flag="${d.id}">Flag Dispute</button>` : ''}
        </td>
      </tr>`;
    }).join('');

    // Resolve button → open modal
    tbody.querySelectorAll('[data-resolve]').forEach(btn => {
      btn.addEventListener('click', () => openModal(btn.dataset.resolve, 'resolve'));
    });

    // Flag as disputed
    tbody.querySelectorAll('[data-flag]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.flag;
        const confirmed = confirm('Flag this deal as disputed? Both parties will see this status.');
        if (!confirmed) return;
        btn.disabled = true;
        try {
          await updateDoc(doc(db, 'deals', id), { status: 'disputed' });
          const deal = allDeals.find(x => x.id === id);
          if (deal) deal.status = 'disputed';
          renderStats();
          renderFilters();
          renderTable();
          showToast('Deal flagged as disputed.');
        } catch (err) {
          console.error(err);
          showToast('Failed. Try again.');
          btn.disabled = false;
        }
      });
    });
  }

  // Sort on header click
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortCol = col; sortDir = 'asc'; }
      document.querySelectorAll('thead th').forEach(t => t.classList.remove('sort-asc', 'sort-desc'));
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
      renderTable();
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value.trim();
    renderTable();
  });

  // CSV Export
  document.getElementById('exportBtn').addEventListener('click', () => {
    const deals = getFilteredDeals();
    const headers = ['ID','Freelancer','Freelancer Email','Client','Client Email','Work','Amount','Deadline','Status','Payment Status','Created','Resolution Note'];
    const rows = deals.map(d => [
      d.id,
      `"${d.freelancerName||''}"`,
      `"${d.freelancerEmail||''}"`,
      `"${d.clientName||''}"`,
      `"${d.clientEmail||''}"`,
      `"${(d.workDescription||'').replace(/"/g,'""')}"`,
      d.paymentAmount || 0,
      `"${d.deadline||''}"`,
      `"${d.status||''}"`,
      `"${d.paymentStatus||'unpaid'}"`,
      `"${d.createdAt ? new Date(d.createdAt).toLocaleDateString('en-IN') : ''}"`,
      `"${(d.resolutionNote||'').replace(/"/g,'""')}"`
    ]);
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `freebie-deals-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  });

  // ─── Dispute Modal ─────────────────────────────────────────
  function openModal(dealId, mode) {
    activeModalDealId = dealId;
    const deal = allDeals.find(x => x.id === dealId);
    document.getElementById('modalTitle').textContent = 'Resolve Dispute';
    document.getElementById('modalMeta').textContent =
      `${deal?.freelancerName || 'Freelancer'} ↔ ${deal?.clientName || 'Client'} · ${(deal?.workDescription||'').substring(0,60)}`;
    document.getElementById('resolutionNote').value = deal?.resolutionNote || '';
    document.getElementById('disputeModal').classList.remove('hidden');
  }

  document.getElementById('modalCancelBtn').addEventListener('click', () => {
    document.getElementById('disputeModal').classList.add('hidden');
    activeModalDealId = null;
  });

  // Mark Resolved → status: completed
  document.getElementById('modalResolveBtn').addEventListener('click', async () => {
    if (!activeModalDealId) return;
    const note = document.getElementById('resolutionNote').value.trim();
    try {
      await updateDoc(doc(db, 'deals', activeModalDealId), {
        status: 'completed',
        resolutionNote: note || 'Resolved by admin.'
      });
      const deal = allDeals.find(x => x.id === activeModalDealId);
      if (deal) { deal.status = 'completed'; deal.resolutionNote = note || 'Resolved by admin.'; }
      document.getElementById('disputeModal').classList.add('hidden');
      activeModalDealId = null;
      renderStats(); renderFilters(); renderTable();
      showToast('Dispute resolved. Deal marked completed.');
    } catch (err) {
      console.error(err);
      showToast('Failed. Try again.');
    }
  });

  // Re-open as Active
  document.getElementById('modalReopenBtn').addEventListener('click', async () => {
    if (!activeModalDealId) return;
    const note = document.getElementById('resolutionNote').value.trim();
    const confirmed = confirm('Re-open this deal as active? Both parties will be able to continue.');
    if (!confirmed) return;
    try {
      await updateDoc(doc(db, 'deals', activeModalDealId), {
        status: 'active',
        resolutionNote: note || 'Re-opened by admin.'
      });
      const deal = allDeals.find(x => x.id === activeModalDealId);
      if (deal) { deal.status = 'active'; deal.resolutionNote = note || 'Re-opened by admin.'; }
      document.getElementById('disputeModal').classList.add('hidden');
      activeModalDealId = null;
      renderStats(); renderFilters(); renderTable();
      showToast('Deal re-opened as active.');
    } catch (err) {
      console.error(err);
      showToast('Failed. Try again.');
    }
  });

  // Close modal on overlay click
  document.getElementById('disputeModal').addEventListener('click', e => {
    if (e.target === document.getElementById('disputeModal')) {
      document.getElementById('disputeModal').classList.add('hidden');
      activeModalDealId = null;
    }
  });
</script>
</body>
</html>
