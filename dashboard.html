<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Freebie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container" style="max-width: 800px;">

    <div class="dash-header">
      <h1>My Deals</h1>
      <a href="create.html" class="btn">+ New Deal</a>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="filterDeals('all', event)">All</button>
      <button class="filter-btn" onclick="filterDeals('pending', event)">Pending</button>
      <button class="filter-btn" onclick="filterDeals('in_progress', event)">In Progress</button>
      <button class="filter-btn" onclick="filterDeals('delivered', event)">Delivered</button>
      <button class="filter-btn" onclick="filterDeals('completed', event)">Completed</button>
      <button class="filter-btn" onclick="filterDeals('disputed', event)">Disputed</button>
    </div>

    <div id="loadingMsg"><p>Loading your deals...</p></div>
    <div id="emptyMsg" class="hidden"><p style="color:#888; margin-top:32px;">No deals found.</p></div>
    <div id="dealsList"></div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─── Fetch config securely from backend ──────────────────
    const res = await fetch('/api/config');
    const firebaseConfig = await res.json();

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function escapeHTML(str) {
      if (!str) return "";
      return String(str).replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    }

    let allDeals = [];

    async function loadDeals() {
      try {
        const q = query(collection(db, 'deals'), orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);

        allDeals = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        document.getElementById('loadingMsg').classList.add('hidden');
        renderDeals(allDeals);
      } catch (err) {
        console.error('Error loading deals:', err);
        document.getElementById('loadingMsg').innerHTML =
          '<p style="color:red">Error loading deals. Check console.</p>';
      }
    }

    function renderDeals(deals) {
      const list     = document.getElementById('dealsList');
      const emptyMsg = document.getElementById('emptyMsg');

      list.innerHTML = '';

      if (deals.length === 0) {
        emptyMsg.classList.remove('hidden');
        return;
      }

      emptyMsg.classList.add('hidden');

      deals.forEach(deal => {
        const statusLabel = escapeHTML(deal.status.replace('_', ' ').toUpperCase());
        const card = document.createElement('div');
        card.className = 'dash-card';
        card.innerHTML = `
          <div class="dash-card-top">
            <div>
              <span class="deal-badge badge-${escapeHTML(deal.status)}">${statusLabel}</span>
              <h3 class="dash-card-title">${escapeHTML(deal.freelancerName)} × ${escapeHTML(deal.clientName)}</h3>
            </div>
            <span class="dash-amount">₹${Number(deal.paymentAmount).toLocaleString('en-IN')}</span>
          </div>
          <p class="dash-work">${escapeHTML(deal.workDescription)}</p>
          <div class="dash-card-footer">
            <span class="dash-meta">📅 ${escapeHTML(deal.deadline)}</span>
            <span class="dash-meta">
              ${deal.freelancerAgreed ? '✅' : '⏳'} Freelancer
              &nbsp;|&nbsp;
              ${deal.clientAgreed ? '✅' : '⏳'} Client
            </span>
            <a href="deal.html?id=${escapeHTML(deal.id)}" class="dash-view-btn">View →</a>
          </div>
        `;
        list.appendChild(card);
      });
    }

    window.filterDeals = function(status, event) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderDeals(status === 'all' ? allDeals : allDeals.filter(d => d.status === status));
    };

    loadDeals();
  </script>

</body>
</html>
