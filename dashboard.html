<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Freebie</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container" style="max-width: 800px;">

    <div class="dash-header">
      <h1>My Deals</h1>
      <a href="create.html" class="btn">+ New Deal</a>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="filterDeals('all')">All</button>
      <button class="filter-btn" onclick="filterDeals('pending')">Pending</button>
      <button class="filter-btn" onclick="filterDeals('in_progress')">In Progress</button>
      <button class="filter-btn" onclick="filterDeals('delivered')">Delivered</button>
      <button class="filter-btn" onclick="filterDeals('completed')">Completed</button>
      <button class="filter-btn" onclick="filterDeals('disputed')">Disputed</button>
    </div>

    <div id="loadingMsg"><p>Loading your deals...</p></div>
    <div id="emptyMsg" class="hidden"><p style="color:#888; margin-top:32px;">No deals found.</p></div>
    <div id="dealsList"></div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3PZU3-2kuJpnydsKU6VOUP6G-KZH27-E",
  authDomain: "freebie-5762a.firebaseapp.com",
  projectId: "freebie-5762a",
  storageBucket: "freebie-5762a.firebasestorage.app",
  messagingSenderId: "621180509813",
  appId: "1:621180509813:web:51c7403390e80c91e1a23c",
  measurementId: "G-PQX9HHGD0J"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allDeals = [];

    async function loadDeals() {
      try {
        const q = query(collection(db, 'deals'), orderBy('createdAt', 'desc'));
        const snapshot = await getDocs(q);

        allDeals = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));

        document.getElementById('loadingMsg').classList.add('hidden');
        renderDeals(allDeals);

      } catch (err) {
        console.error('Error loading deals:', err);
        document.getElementById('loadingMsg').innerHTML =
          '<p style="color:red">Error loading deals. Check console.</p>';
      }
    }

    function renderDeals(deals) {
      const list = document.getElementById('dealsList');
      const emptyMsg = document.getElementById('emptyMsg');

      list.innerHTML = '';

      if (deals.length === 0) {
        emptyMsg.classList.remove('hidden');
        return;
      }

      emptyMsg.classList.add('hidden');

      deals.forEach(deal => {
        const card = document.createElement('div');
        card.className = 'dash-card';
        card.innerHTML = `
          <div class="dash-card-top">
            <div>
              <span class="deal-badge badge-${deal.status}">
                ${deal.status.replace('_', ' ').toUpperCase()}
              </span>
              <h3 class="dash-card-title">${deal.freelancerName} × ${deal.clientName}</h3>
            </div>
            <span class="dash-amount">₹${Number(deal.paymentAmount).toLocaleString('en-IN')}</span>
          </div>
          <p class="dash-work">${deal.workDescription}</p>
          <div class="dash-card-footer">
            <span class="dash-meta">📅 ${deal.deadline}</span>
            <span class="dash-meta">
              ${deal.freelancerAgreed ? '✅' : '⏳'} Freelancer
              &nbsp;|&nbsp;
              ${deal.clientAgreed ? '✅' : '⏳'} Client
            </span>
            <a href="deal.html?id=${deal.id}" class="dash-view-btn">View →</a>
          </div>
        `;
        list.appendChild(card);
      });
    }

    window.filterDeals = function(status) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      if (status === 'all') {
        renderDeals(allDeals);
      } else {
        renderDeals(allDeals.filter(d => d.status === status));
      }
    };

    loadDeals();
  </script>

</body>
</html>
