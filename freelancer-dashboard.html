<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freelancer Dashboard – Freebie</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">Freebie</a>
        <div class="nav-right">
            <span id="navUserName"></span>
            <button id="navLogoutBtn" class="btn btn-outline btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <h1>My Deals</h1>
            <div class="dashboard-actions">
                <a href="create.html" class="btn">+ New Deal</a>
            </div>
        </div>

        <div id="dealsList">
            <p class="loading-msg">Loading your deals...</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3PZU3-2kuJpnydsKU6VOUP6G-KZH27-E",
            authDomain: "freebie-5762a.firebaseapp.com",
            projectId: "freebie-5762a",
            storageBucket: "freebie-5762a.firebasestorage.app",
            messagingSenderId: "621180509813",
            appId: "1:621180509813:web:51c7403390e80c91e1a23c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'No deadline';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function safeText(str, limit = 60) {
            if (!str) return 'Untitled work';
            return str.length > limit ? str.substring(0, limit) + '...' : str;
        }

        function getDealURL(id) {
            return `${window.location.origin}/deal.html?id=${id}`;
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            // Role guard — clients should not be here
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists() && userDoc.data().role === 'client') {
                window.location.href = 'client-dashboard.html';
                return;
            }

            document.getElementById('navUserName').textContent = user.displayName || user.email;

            const q = query(collection(db, 'deals'), where('freelancerEmail', '==', user.email));
            const snapshot = await getDocs(q);
            const dealsList = document.getElementById('dealsList');
            const dealEntries = snapshot.docs.map((docSnap) => ({
                id: docSnap.id,
                data: docSnap.data()
            }));

            if (snapshot.empty) {
                dealsList.innerHTML = `
                    <div class="empty-state">
                        <p>No deals yet.</p>
                        <a href="create.html" class="btn">Create your first deal</a>
                    </div>`;
                return;
            }

            await Promise.all(
                dealEntries.map(async (dealEntry) => {
                    const d = dealEntry.data;
                    if (d.status === 'pending' && d.deadline && new Date(d.deadline) < new Date()) {
                        await updateDoc(doc(db, 'deals', dealEntry.id), { status: 'expired' });
                        d.status = 'expired';
                    }
                })
            );

            let html = '';
            dealEntries.forEach((dealEntry) => {
                const d = dealEntry.data;
                const id = dealEntry.id;
                const statusClass = d.status === 'agreed' ? 'status-agreed'
                    : d.status === 'expired' ? 'status-expired'
                    : d.status === 'completed' ? 'status-completed'
                    : 'status-pending';

                html += `
                    <div class="deal-card">
                        <div class="deal-card-top">
                            <div>
                                <h3>${safeText(d.workDescription)}</h3>
                                <p class="deal-meta">
                                    Client: ${d.clientName || 'Unknown'}
                                    &nbsp;|&nbsp; ₹${d.paymentAmount || 0}
                                    &nbsp;|&nbsp; Due: ${formatDate(d.deadline)}
                                </p>
                            </div>
                            <span class="status-badge ${statusClass}">${d.status}</span>
                        </div>
                        <div class="deal-card-actions">
                            <a href="deal.html?id=${id}" class="btn btn-outline btn-sm">View Deal</a>
                            <button class="btn btn-sm" data-copy="${id}">Copy Link</button>
                            <button class="btn btn-whatsapp btn-sm" data-whatsapp="${id}">WhatsApp</button>
                        </div>
                    </div>`;
            });

            dealsList.innerHTML = html;

            // Event delegation — no globals needed
            dealsList.addEventListener('click', (e) => {
                const copyBtn = e.target.closest('[data-copy]');
                const waBtn = e.target.closest('[data-whatsapp]');

                if (copyBtn) {
                    navigator.clipboard.writeText(getDealURL(copyBtn.dataset.copy));
                    showToast('Link copied!');
                }
                if (waBtn) {
                    const url = getDealURL(waBtn.dataset.whatsapp);
                    const msg = `Hi! Please review and agree to our deal here: ${url}`;
                    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
                }
            });
        });

        document.getElementById('navLogoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
