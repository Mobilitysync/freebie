<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Dashboard - Freebie</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .pay-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 6px;
    }
    .pay-unpaid  { background: #fff3cd; color: #856404; }
    .pay-partial { background: #ffe0b2; color: #a05c00; }
    .pay-paid    { background: #d1e7dd; color: #0a3622; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">Freebie</a>
      <div class="nav-right">
        <span id="navUserName"></span>
        <button id="navLogoutBtn" class="btn btn-outline btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="dashboard-header">
      <h1>Deals Shared With Me</h1>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <input type="text" class="search-box" id="searchInput"
      placeholder="Search by freelancer name or work description..." />

    <div class="filter-row" id="filterRow"></div>

    <div id="dealsList">
      <div class="skeleton-card"><div class="skeleton-line medium"></div><div class="skeleton-line full"></div><div class="skeleton-line short"></div></div>
      <div class="skeleton-card"><div class="skeleton-line medium"></div><div class="skeleton-line full"></div><div class="skeleton-line short"></div></div>
      <div class="skeleton-card"><div class="skeleton-line medium"></div><div class="skeleton-line full"></div><div class="skeleton-line short"></div></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, getDoc, doc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ─── Fetch config securely from backend ──────────────────
    const res = await fetch('/api/config');
    const firebaseConfig = await res.json();

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // requestIdleCallback polyfill for Safari
    window.requestIdleCallback = window.requestIdleCallback || function (cb) {
      var start = Date.now();
      return setTimeout(function () {
        cb({
          didTimeout: false,
          timeRemaining: function () { return Math.max(0, 50 - (Date.now() - start)); }
        });
      }, 1);
    };

    function escapeHTML(str) {
      if (!str) return "";
      return String(str).replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'No deadline';
      return new Date(dateStr).toLocaleDateString('en-IN', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
    }

    function safeText(str, limit = 60) {
      if (!str) return 'Untitled work';
      const escaped = escapeHTML(str);
      return escaped.length > limit ? escaped.substring(0, limit) + '…' : escaped;
    }

    function debounce(fn, delay) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    let allDeals = [];
    let currentFilter = 'all';
    let currentSearch = '';

    const PAYMENT_LABELS = {
      unpaid:  { label: '❌ Unpaid',  cls: 'pay-unpaid'  },
      partial: { label: '🔶 Partial', cls: 'pay-partial' },
      paid:    { label: '✅ Paid',    cls: 'pay-paid'    }
    };

    const STATUS_CLASS = {
      agreed: 'status-agreed', expired: 'status-expired',
      completed: 'status-completed', disputed: 'status-disputed'
    };

    const elements = {
      statsBar:    document.getElementById('statsBar'),
      filterRow:   document.getElementById('filterRow'),
      dealsList:   document.getElementById('dealsList'),
      searchInput: document.getElementById('searchInput'),
      navUserName: document.getElementById('navUserName')
    };

    function renderStats() {
      const statuses = ['pending', 'agreed', 'completed', 'disputed', 'expired'];
      const counts = { total: allDeals.length };
      statuses.forEach(s => counts[s] = allDeals.filter(d => d.data.status === s).length);
      const colors = {
        total: '#1a1a1a', pending: '#856404', agreed: '#0a3622',
        completed: '#004085', disputed: '#721c24', expired: '#555'
      };
      elements.statsBar.innerHTML = Object.entries(counts)
        .map(([key, val]) => `
          <span class="stat-pill" style="background:${colors[key]}15; color:${colors[key]}">
            ${val} ${escapeHTML(key)}
          </span>`
        ).join('');
    }

    function renderFilters() {
      const filters = ['all', 'pending', 'agreed', 'completed', 'disputed', 'expired'];
      elements.filterRow.innerHTML = filters.map(f => `
        <button class="filter-btn ${currentFilter === f ? 'active' : ''}" data-filter="${f}">
          ${f.charAt(0).toUpperCase() + f.slice(1)}
        </button>
      `).join('');
    }

    function renderDeals() {
      const q = currentSearch.toLowerCase();
      const filtered = allDeals
        .filter(({ data: d }) => currentFilter === 'all' || d.status === currentFilter)
        .filter(({ data: d }) => {
          if (!q) return true;
          return (d.freelancerName || '').toLowerCase().includes(q) ||
                 (d.workDescription || '').toLowerCase().includes(q);
        });

      if (filtered.length === 0) {
        elements.dealsList.innerHTML = `<div class="empty-state"><p>No deals match your filter.</p></div>`;
        return;
      }

      elements.dealsList.innerHTML = filtered.map(({ id, data: d }) => {
        const ps = d.paymentStatus || 'unpaid';
        const pay = PAYMENT_LABELS[ps] || PAYMENT_LABELS.unpaid;
        const agreedText = d.clientAgreed ? '✅ You have agreed' : '⏳ Awaiting your agreement';
        const sc = STATUS_CLASS[d.status] || 'status-pending';

        return `
          <div class="deal-card">
            <div class="deal-card-top">
              <div>
                <h3>${safeText(d.workDescription)}</h3>
                <p class="deal-meta">Freelancer: ${escapeHTML(d.freelancerName || 'Unknown')}</p>
                <p class="deal-meta" style="font-weight:600; color:#1a1a1a;">
                  ₹${(d.paymentAmount || 0).toLocaleString('en-IN')} &bull; Due: ${escapeHTML(formatDate(d.deadline))}
                </p>
                <p class="deal-meta" style="margin-top:8px;">${escapeHTML(agreedText)}</p>
                <span class="pay-pill ${pay.cls}" style="margin-top:12px;">${pay.label}</span>
              </div>
              <span class="status-badge ${sc}">${escapeHTML(d.status)}</span>
            </div>
            <div class="deal-card-actions">
              <a href="deal.html?id=${escapeHTML(id)}" class="btn btn-primary btn-sm">View & Agree</a>
            </div>
          </div>`;
      }).join('');
    }

    elements.filterRow.addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderDeals();
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }

      const [userDoc, snapshot] = await Promise.all([
        getDoc(doc(db, 'users', user.uid)),
        getDocs(query(collection(db, 'deals'), where('clientEmail', '==', user.email)))
      ]);

      if (userDoc.exists() && userDoc.data().role === 'freelancer') {
        window.location.href = 'freelancer-dashboard.html'; return;
      }

      elements.navUserName.textContent = user.displayName || user.email;
      allDeals = snapshot.docs.map(docSnap => ({ id: docSnap.id, data: docSnap.data() }));

      // Auto-expire past-deadline pending deals
      const batch = writeBatch(db);
      let hasExpired = false;
      const now = new Date();
      allDeals.forEach(({ id, data: d }) => {
        if (d.status === 'pending' && d.deadline && new Date(d.deadline) < now) {
          batch.update(doc(db, 'deals', id), { status: 'expired' });
          d.status = 'expired';
          hasExpired = true;
        }
      });
      if (hasExpired) await batch.commit();

      if (allDeals.length === 0) {
        elements.dealsList.innerHTML = `
          <div class="empty-state">
            <p>No deals shared with you yet.</p>
            <p style="font-size:14px; color:#999; margin-top:8px;">Ask your freelancer to share a deal link.</p>
          </div>`;
        return;
      }

      renderStats();
      renderFilters();
      renderDeals();

      const handleSearch = debounce((e) => {
        currentSearch = e.target.value.trim();
        renderDeals();
      }, 250);
      elements.searchInput.addEventListener('input', handleSearch);
    });

    document.getElementById('navLogoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>
  <script src="parallax-bg.js"></script>
</body>
</html>
