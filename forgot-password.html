<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – Freebie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">Freebie</a>
      <div class="nav-right">
        <span id="navUserName"></span>
      </div>
    </div>
  </nav>

  <div class="container">

    <a href="index.html" class="back-link">← Back</a>

    <h1>Reset Password</h1>
    <p class="tagline">Enter your email and we'll send you a link to reset your password.</p>

    <div class="auth-box">

      <form id="emailForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="auth-actions">
          <button type="button" id="resetBtn" class="btn" style="width: 100%;">Reset Password</button>
        </div>
      </form>

      <p id="authError" class="error-msg hidden"></p>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { showError, hideError, friendlyError } from "./ui-utils.js";

    // ─── Fetch config securely from backend ──────────────────
    const res = await fetch('/api/config');
    const firebaseConfig = await res.json();

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('resetBtn').addEventListener('click', async () => {
      hideError('authError');
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('authError', 'Enter your email above first.'); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        showError('authError', '✅ Reset email sent. Check your inbox.');
        document.getElementById('authError').style.color = '#0a3622';
      } catch (err) {
        showError('authError', friendlyError(err.code));
      }
    });

    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('resetBtn').click();
      }
    });
  </script>

</body>
</html>
